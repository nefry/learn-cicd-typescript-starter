name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Migrate database
        run: npm run db:migrate

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: 'Deploy to GCP'
        run: gcloud builds submit --tag europe-west4-docker.pkg.dev/notely-495719/notely-ar-repo/aolena/notely:latest .

      - name: 'Deploy to Cloud Run'
        run: gcloud run deploy notely --image europe-west4-docker.pkg.dev/notely-495719/notely-ar-repo/aolena/notely:latest --region europe-west1 --allow-unauthenticated --project notely-495719 --max-instances=4